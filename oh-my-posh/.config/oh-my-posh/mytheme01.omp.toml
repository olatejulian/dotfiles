version = 4
final_space = true

[[blocks]]
type = "prompt"
alignment = "left"

# PATH
[[blocks.segments]]
type = "path"
style = "powerline"
foreground = "black"
background = "blue"
template = " {{ .Path }} "

# GIT
[[blocks.segments]]
type = "git"
style = "powerline"
foreground = "black"
background = "green"
background_templates = [
    "{{ if or (.Working.Changed) (.Staging.Changed) }}yellow{{ end }}",
    "{{ if and (gt .Ahead 0) (gt .Behind 0) }}magenta{{ end }}",
]
template = "  {{ .HEAD }} "

# STATUS
[[blocks.segments]]
type = "status"
style = "plain"
foreground = "red"
template = "{{ if gt .Code 0 }} ✘ {{ end }}"

[[blocks]]
type = "rprompt"
alignment = "right"

# PYTHON
[[blocks.segments]]
type = "python"
style = "plain"
foreground = "yellow"
template = " 🐍 {{ .Full }} "

# NODE
[[blocks.segments]]
type = "node"
style = "plain"
foreground = "green"
template = " ⬢ {{ .Full }} "

# TIME
[[blocks.segments]]
type = "time"
style = "plain"
foreground = "darkGray"
template = " {{ .CurrentDate | date \"15:04\" }} "
